<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access Gateway - ElectroVerse</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" >
    
    <style>
        body {
            background: radial-gradient(circle at 50% 50%, #141829 0%, #090b14 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #f1f3f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(22, 25, 37, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        .gateway-icon {
            font-size: 3.5rem;
            color: #3b82f6;
            margin-bottom: 20px;
        }
        .form-label-custom {
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .form-control-custom {
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #ffffff;
            border-radius: 10px;
            padding: 12px;
            font-size: 0.95rem;
            width: 100%;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .form-control-custom:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .btn-submit-custom {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
        }
        .btn-submit-custom:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <div class="gateway-icon">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h4 class="fw-bold text-white mb-1">Admin Access Gateway</h4>
        <p class="text-muted small mb-4">Secure Cryptographic System Authentication</p>
        
        <div id="loginErrorAlert" class="alert alert-danger d-none py-2 small" role="alert">
            <i class="fa-solid fa-triangle-exclamation me-1"></i> Invalid Gateway Credentials!
        </div>

        <form id="gatewayLoginForm" class="text-start">
            <label class="form-label-custom">Username Descriptor</label>
            <input type="text" id="gatewayUser" class="form-control-custom" placeholder="Enter secure username" required autocomplete="off">

            <label class="form-label-custom">Secure Access Key Token</label>
            <input type="password" id="gatewayPass" class="form-control-custom" placeholder="Enter secret token" required>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="rememberToken" checked>
                <label class="form-check-label small text-muted" for="rememberToken">
                    Remember Authentication Token
                </label>
            </div>

            <button type="submit" class="btn-submit-custom">Initialize Credentials</button>
        </form>
    </div>
    <!-- Cryptographic Verification Engine Script -->
    <script>
        document.getElementById('gatewayLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userInput = document.getElementById('gatewayUser').value.trim();
            const passInput = document.getElementById('gatewayPass').value.trim();

            // ইনপুটগুলোকে এনকোড করে কোডের সাথে মেলানো হচ্ছে (যাতে কেউ সরাসরি পাসওয়ার্ড না দেখে)
            const encodedUser = btoa(userInput);
            const encodedPass = btoa(passInput);

            // 'emFyaXI1ODA2' হলো zarir5806 এবং 'NTgwNjQx' হলো 580641 এর এনকোডেড রূপ
            if (encodedUser === "emFyaXI1ODA2" && encodedPass === "NTgwNjQx") {
                localStorage.setItem('isAdminAuthenticated', 'true');
                window.location.href = 'dashboard.html';
            } else {
                const errorAlert = document.getElementById('loginErrorAlert');
                errorAlert.classList.remove('d-none');
                document.getElementById('gatewayPass').value = '';
                setTimeout(() => errorAlert.classList.add('d-none'), 3000);
            }
        });
    </script>
    
</body>
</html>
