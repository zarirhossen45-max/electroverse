<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Hub Engine Summary - ElectroVerse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #0f111a;
            color: #e2e8f0;
            font-family: system-ui, -apple-system, sans-serif;
            padding-bottom: 40px;
        }
        .sidebar-node {
            background-color: #161925;
            border: 1px solid #22293f;
            border-radius: 14px;
            padding: 20px;
        }
        .main-panel-card {
            background-color: #161925;
            border: 1px solid #22293f;
            border-radius: 14px;
            padding: 24px;
        }
        .nav-custom-link {
            display: flex;
            align-items: center;
            color: #94a3b8;
            padding: 10px 12px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }
        .nav-custom-link:hover, .nav-custom-link.active {
            background-color: #1e293b;
            color: #3b82f6;
        }
        .form-label-custom {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .form-control-custom {
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #ffffff;
            border-radius: 8px;
            padding: 10px;
            font-size: 0.9rem;
            width: 100%;
            margin-bottom: 15px;
        }
        .form-control-custom:focus {
            border-color: #3b82f6;
            outline: none;
        }
        .metric-badge {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            text-center;
        }
        .btn-action-save {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-action-save:hover { background-color: #2563eb; }
    </style>
</head>
<body>

    <header class="py-3 px-4 border-bottom border-secondary border-opacity-10 mb-4" style="background-color: #161925;">
        <div class="d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold text-white"><i class="fa-solid fa-sliders text-primary me-2"></i>Control Hub</h5>
            <button onclick="logoutEngine()" class="btn btn-sm btn-outline-danger px-3"><i class="fa-solid fa-power-off me-1"></i>Logout</button>
        </div>
    </header>

    <main class="container-fluid px-4">
        <div class="row g-4">
            
            <div class="col-12 col-md-3">
                <div class="sidebar-node shadow-sm">
                    <p class="text-muted small fw-bold text-uppercase mb-2">Navigation Engine</p>
                    <nav>
                        <a href="#" class="nav-custom-link active"><i class="fa-solid fa-chart-line me-2"></i>Dashboard Summary</a>
                        <a href="about.html" class="nav-custom-link"><i class="fa-solid fa-user me-2"></i>View Profile Page</a>
                        <a href="index.html" class="nav-custom-link"><i class="fa-solid fa-house me-2"></i>Home Portal</a>
                    </nav>

                    <hr class="border-secondary opacity-25 my-3">
                    
                    <p class="text-muted small fw-bold text-uppercase mb-2">Status Metrics</p>
                    <div class="metric-badge text-center">
                        <span class="text-muted small d-block">Total Registered Elements</span>
                        <h3 class="fw-bold text-primary mb-0 mt-1">124 GB</h3>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-9">
                <div class="main-panel-card shadow-sm">
                    <h4 class="text-white fw-bold mb-1">Edit Profile Context Config</h4>
                    <p class="text-muted small mb-4">Dynamically alter parameters served to the local context matrix.</p>
                    
                    <div id="saveSuccessAlert" class="alert alert-success d-none py-2 small" role="alert">
                        <i class="fa-solid fa-circle-check me-1"></i> Configuration values pushed to core state storage engine successfully!
                    </div>

                    <form id="profileStateConfigForm">
                        <div class="row">
                            <div class="col-md-6">
                                <label class="form-label-custom">Full Profile Legal Representation Name</label>
                                <input type="text" id="cfgName" class="form-control-custom" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Contact Endpoint Mail Anchor</label>
                                <input type="email" id="cfgEmail" class="form-control-custom" required>
                            </div>
                        </div>

                        <label class="form-label-custom">Academic Profile Mapping & Education Credentials</label>
                        <input type="text" id="cfgEdu" class="form-control-custom" required>

                        <label class="form-label-custom">Biographical Context Summarization Vector String</label>
                        <textarea id="cfgBio" class="form-control-custom" rows="3" style="resize: none;" required></textarea>

                        <div class="row">
                            <div class="col-md-6">
                                <label class="form-label-custom">GitHub URL Endpoint Node</label>
                                <input type="url" id="cfgGithub" class="form-control-custom" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Profile Image URL/Blob Path</label>
                                <input type="url" id="cfgImage" class="form-control-custom" placeholder="https://example.com/avatar.jpg">
                            </div>
                        </div>

                        <div class="text-end mt-2">
                            <button type="submit" class="btn-action-save shadow-sm">Commit Changes to Engine</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </main>

    <script>
        // সিকিউরিটি লকআউট গেটওয়ে চেক
        if (localStorage.getItem('isAdminAuthenticated') !== 'true') {
            window.location.href = 'login.html';
        }

        document.addEventListener("DOMContentLoaded", function() {
            const defaultProfile = {
                name: "MD. ZIKRUL HOSSEN ZARIR",
                email: "zarirhossen45@gmail.com",
                education: "National Institute of Textile Engineering and Research (NITER)",
                bio: "Engineering student enrolled at NITER, actively engaging with advanced Electrical Circuit Analysis techniques, Computer Programming architectures, and experimental scientific models. Dedicated to exploring modern structural systems and hardware solutions.",
                github: "https://github.com/zarirhossen45-max",
                image: "https://avatars.githubusercontent.com/u/190367202?v=4"
            };

            const data = JSON.parse(localStorage.getItem('userProfileData')) || defaultProfile;

            // ফর্ম ফিল্ডে পুরানো ডাটা লোড করা
            document.getElementById('cfgName').value = data.name;
            document.getElementById('cfgEmail').value = data.email;
            document.getElementById('cfgEdu').value = data.education;
            document.getElementById('cfgBio').value = data.bio;
            document.getElementById('cfgGithub').value = data.github;
            document.getElementById('cfgImage').value = data.image;

            // ডাটা সেভ ইঞ্জিন
            document.getElementById('profileStateConfigForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const updatedData = {
                    name: document.getElementById('cfgName').value,
                    email: document.getElementById('cfgEmail').value,
                    education: document.getElementById('cfgEdu').value,
                    bio: document.getElementById('cfgBio').value,
                    github: document.getElementById('cfgGithub').value,
                    image: document.getElementById('cfgImage').value || defaultProfile.image
                };

                localStorage.setItem('userProfileData', JSON.stringify(updatedData));
                const alertNode = document.getElementById('saveSuccessAlert');
                alertNode.classList.remove('d-none');
                setTimeout(() => alertNode.classList.add('d-none'), 4000);
            });
        });

        function logoutEngine() {
            localStorage.removeItem('isAdminAuthenticated');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
