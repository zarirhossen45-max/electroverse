<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroVerse Portal - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f111a; color: #e2e8f0; font-family: system-ui, sans-serif; padding-top: 80px; }
        .custom-nav { background-color: #161925; border-bottom: 1px solid #22293f; }
        .navbar-brand { color: #3b82f6 !important; font-weight: bold; }
        .nav-link { color: #94a3b8 !important; }
        .nav-link.active { color: #ffffff !important; }
        
        /* মডার্ন ডিভাইস কার্ড লাউঞ্জ */
        .device-card {
            background-color: #161925;
            border: 1px solid #22293f;
            border-radius: 14px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .device-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.15);
        }
        .device-img { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid #22293f; }
        .device-tag { font-size: 0.75rem; background-color: #1e293b; color: #3b82f6; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
    </style>
</head>
<body>

    <!-- Top Navigation Bar -->
    <nav class="navbar navbar-expand-lg fixed-top custom-nav navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fa-solid fa-microchip me-2"></i>ElectroVerse</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Me</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Dynamic Cards Section -->
    <div class="container my-5">
        <div class="text-center mb-5">
            <h2 class="fw-bold text-white">Electronics Devices & Hardware Components</h2>
            <p class="text-muted">Explore dynamic architectural systems and modern hardware solutions deployed live.</p>
        </div>

        <!-- এই রো (Row) এর ভেতরে ড্যাশবোর্ডের ডিভাইসগুলো স্বয়ংক্রিয়ভাবে লোড হবে -->
        <div class="row g-4" id="homeDeviceShowcase">
            <!-- Dynamic Injection Via LocalStorage -->
        </div>
    </div>

    <!-- Live Showcase Script Engine -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const showcase = document.getElementById('homeDeviceShowcase');
            const devices = JSON.parse(localStorage.getItem('electroDevices')) || [];

            if(devices.length === 0) {
                showcase.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="fa-solid fa-circle-info text-muted fs-1 mb-3"></i>
                        <p class="text-muted">No electronics components currently published in the catalog dashboard.</p>
                    </div>`;
                return;
            }

            showcase.innerHTML = ''; // ক্লিয়ার ডিফল্ট মেসেজ
            
            devices.forEach(dev => {
                const cardCol = document.createElement('div');
                cardCol.className = "col-12 col-md-6 col-lg-4";
                cardCol.innerHTML = `
                    <div class="device-card h-100 shadow-sm">
                        <img src="${dev.image}" class="device-img" alt="${dev.name}">
                        <div class="p-3">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="device-tag">${dev.tag}</span>
                            </div>
                            <h5 class="fw-bold text-white mb-2">${dev.name}</h5>
                            <p class="text-muted small mb-0" style="line-height: 1.6;">${dev.desc}</p>
                        </div>
                    </div>
                `;
                showcase.appendChild(cardCol);
            });
        });
    </script>
</body>
</html>
