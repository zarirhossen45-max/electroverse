    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* সাইবার ডার্ক প্রিমিয়াম ব্যাকগ্রাউন্ড */
        body { 
            background: radial-gradient(circle at 50% 50%, #141829 0%, #090b14 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #f1f3f9;
            min-height: 100vh;
            overflow-y: auto;
            padding-bottom: 40px;
        }

        /* গ্লাস মরফিজম নেভিগেশন বার */
        .glass-nav {
            background: rgba(9, 11, 20, 0.85) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* রেসপনসিভ গ্লাস কার্ড (কোনো ফিক্সড হাইট নেই) */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 24px;
            height: auto;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* প্রফেশনাল ইমেজ ফ্রেম ও সাইবার গ্লো */
        .img-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px auto;
        }
        .profile-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 50%; 
            border: 3px solid #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            display: block;
        }

        /* ব্যাজ কন্টেইনার ও রেসপনসিভ গ্যাপ */
        .badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .badge-tech { 
            background: rgba(59, 130, 246, 0.15); 
            color: #60a5fa; 
            border: 1px solid rgba(59, 130, 246, 0.25);
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .badge-theory {
            background: rgba(168, 85, 247, 0.15);
            color: #c084fc;
            border: 1px solid rgba(168, 85, 247, 0.25);
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .btn-social {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-social:hover {
            background: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
